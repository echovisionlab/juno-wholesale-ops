stackName: juno-wholesale-ops-app-stack
runDirectory: /srv/juno-wholesale-ops
projectName: juno-wholesale-ops
filePaths:
  - compose/app.yml
environment:
  JUNO_WHOLESALE_OPS_STACK_PROJECT_NAME: juno-wholesale-ops
  JUNO_WHOLESALE_OPS_WEB_IMAGE: registry.example.com/example/juno-wholesale-ops-web:sha-REPLACE_ME
  JUNO_WHOLESALE_OPS_CONTAINER_SUFFIX: prod
  JUNO_WHOLESALE_OPS_WEB_PUBLIC_PORT: "3100"
  AUTH_ADMIN_ENABLED: "false"
  AUTH_ADMIN_KRATOS_PUBLIC_URL: ""
  AUTH_ADMIN_LOGIN_URL: ""
  AUTH_ADMIN_LOGIN_REDIRECT_PARAM: redirect
  AUTH_ADMIN_REQUIRED_ROLE: admin
  AUTH_ADMIN_SESSION_COOKIE_NAMES: session
  NEXT_PUBLIC_FONT_STYLESHEET_URL: ""
  GOOGLE_WORKSPACE_DELEGATED_USER: ""
  GOOGLE_GMAIL_SCOPES: https://www.googleapis.com/auth/gmail.modify
  GMAIL_INGEST_QUERY: "has:attachment filename:xlsx newer_than:30d"
  GMAIL_MAX_RESULTS: "25"
  GMAIL_INGEST_LOOKBACK_MS: "604800000"
  GMAIL_PROCESSED_LABEL: Wholesale Processed
  GMAIL_STORAGE_DIR: /var/lib/juno-wholesale-ops/mail-attachments
  CATALOG_ATTACHMENT_PATTERN: "New Preorders|New Releases In Stock"
  SUPPLIER_CODE: juno
  JUNO_LIVE_ENQUEUE_ON_INGEST: "false"
  JUNO_BROWSER_PROFILE_DIR: /var/lib/juno-wholesale-ops/juno-browser-profile
  JUNO_BROWSER_HEADLESS: "true"
  JUNO_LIVE_CONCURRENCY: "6"
  JUNO_LIVE_DELAY_MIN_MS: "15000"
  JUNO_LIVE_DELAY_MAX_MS: "75000"
  JUNO_LIVE_NAV_TIMEOUT_MS: "45000"
  JUNO_LIVE_MAX_ATTEMPTS: "2"
  JUNO_LIVE_POLL_INTERVAL_MS: ""
  JUNO_LIVE_AUTO_ENQUEUE_ON_INTERVAL: "true"
  JUNO_LIVE_AUTO_ENQUEUE_LIMIT: "1000"
  JUNO_LIVE_WORKER_COMMAND: ""
  JUNO_LIVE_WORKER_ARGS: ""
syncFiles:
  - source: compose/app.yml
    target: compose/app.yml
wait:
  timeoutSeconds: 300
  intervalSeconds: 10
  services:
    - name: web-prod
      healthy: true
