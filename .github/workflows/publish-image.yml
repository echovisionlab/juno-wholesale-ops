name: Publish Image

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

concurrency:
  group: publish-image-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  REGISTRY: harbor.dsub.io
  REGISTRY_PROJECT: dsub
  IMAGE_NAME: juno-wholesale-ops-web
  NODE_VERSION: 22
  PLATFORMS: linux/amd64

jobs:
  publish:
    name: Publish Image
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
    env:
      IMAGE_REPOSITORY: harbor.dsub.io/dsub/juno-wholesale-ops-web
      REF_TYPE: ${{ github.ref_type }}
      REF_NAME: ${{ github.ref_name }}
      SHA_TAG: sha-${{ github.sha }}
    outputs:
      image-published: ${{ steps.harbor_credentials.outputs.available }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          persist-credentials: false

      - name: Validate release tag format
        if: ${{ github.ref_type == 'tag' }}
        shell: bash
        run: |
          set -euo pipefail
          if ! [[ "${REF_NAME}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z]+)*$ ]]; then
            echo "Unsupported release tag format: ${REF_NAME}" >&2
            exit 1
          fi

      - name: Check Harbor registry credentials
        id: harbor_credentials
        shell: bash
        env:
          HARBOR_REGISTRY_USERNAME: ${{ secrets.HARBOR_REGISTRY_USERNAME }}
          HARBOR_REGISTRY_PASSWORD: ${{ secrets.HARBOR_REGISTRY_PASSWORD }}
        run: |
          set -euo pipefail
          missing=()
          for var in HARBOR_REGISTRY_USERNAME HARBOR_REGISTRY_PASSWORD; do
            if [ -z "${!var:-}" ]; then
              missing+=("${var}")
            fi
          done

          if [ "${#missing[@]}" -gt 0 ]; then
            if [ "${REF_TYPE}" = "tag" ]; then
              echo "Missing Harbor secrets for release publish: ${missing[*]}" >&2
              exit 1
            fi
            echo "available=false" >> "${GITHUB_OUTPUT}"
            echo "::warning::Skipping Harbor publish; missing secrets: ${missing[*]}"
            exit 0
          fi

          echo "available=true" >> "${GITHUB_OUTPUT}"

      - name: Set up Docker Buildx
        if: ${{ steps.harbor_credentials.outputs.available == 'true' }}
        uses: docker/setup-buildx-action@v4

      - name: Log in to Harbor
        if: ${{ steps.harbor_credentials.outputs.available == 'true' }}
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.HARBOR_REGISTRY_USERNAME }}
          password: ${{ secrets.HARBOR_REGISTRY_PASSWORD }}

      - name: Capture build metadata
        if: ${{ steps.harbor_credentials.outputs.available == 'true' && github.ref_type != 'tag' }}
        shell: bash
        run: |
          set -euo pipefail
          safe_ref_name="$(printf '%s' "${REF_NAME}" | sed -E 's/[^A-Za-z0-9_.-]+/-/g')"
          echo "BUILD_CREATED_AT=$(date -u +"%Y-%m-%dT%H:%M:%SZ")" >> "${GITHUB_ENV}"
          echo "SAFE_REF_NAME=${safe_ref_name}" >> "${GITHUB_ENV}"

      - name: Build and push main image
        if: ${{ steps.harbor_credentials.outputs.available == 'true' && github.ref_type != 'tag' }}
        shell: bash
        env:
          DOCKER_BUILD_RECORD_UPLOAD: "false"
        run: |
          set -euo pipefail
          source_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}"
          docker buildx build \
            --platform "${PLATFORMS}" \
            --provenance=false \
            --sbom=false \
            --push \
            --tag "${IMAGE_REPOSITORY}:${SAFE_REF_NAME}" \
            --tag "${IMAGE_REPOSITORY}:${SHA_TAG}" \
            --label "org.opencontainers.image.created=${BUILD_CREATED_AT}" \
            --label "org.opencontainers.image.revision=${GITHUB_SHA}" \
            --label "org.opencontainers.image.ref.name=${REF_NAME}" \
            --label "org.opencontainers.image.source=${source_url}" \
            --label "org.opencontainers.image.url=${source_url}" \
            --label "org.opencontainers.image.title=${IMAGE_NAME}" \
            --label "org.opencontainers.image.version=${SHA_TAG}" \
            .

      - name: Promote release tag
        if: ${{ steps.harbor_credentials.outputs.available == 'true' && github.ref_type == 'tag' }}
        shell: bash
        run: |
          set -euo pipefail
          source_image="${IMAGE_REPOSITORY}:${SHA_TAG}"
          target_image="${IMAGE_REPOSITORY}:${REF_NAME}"

          for attempt in $(seq 1 90); do
            if docker manifest inspect "${source_image}" >/dev/null 2>&1; then
              docker buildx imagetools create --tag "${target_image}" "${source_image}"
              exit 0
            fi

            if [ "${attempt}" = "90" ]; then
              echo "Timed out waiting for remote image: ${source_image}" >&2
              exit 1
            fi

            sleep 10
          done

  deploy-production:
    name: Deploy Production via Komodo (v-tag)
    needs: publish
    runs-on: ubuntu-latest
    if: ${{ needs.publish.result == 'success' && needs.publish.outputs.image-published == 'true' && github.ref_type == 'tag' && startsWith(github.ref_name, 'v') }}
    timeout-minutes: 20
    environment: production
    env:
      DEPLOY_IMAGE_TAG: ${{ github.ref_name }}
      IMAGE_NAME: juno-wholesale-ops-web
      KOMODO_ALLOW_GMAIL_MODIFY_SCOPE: ${{ vars.KOMODO_ALLOW_GMAIL_MODIFY_SCOPE }}
      KOMODO_FILE_PATHS: ${{ vars.KOMODO_FILE_PATHS }}
      KOMODO_PROJECT_NAME: ${{ vars.KOMODO_PROJECT_NAME }}
      KOMODO_REQUIRE_HEALTHY: ${{ vars.KOMODO_REQUIRE_HEALTHY }}
      KOMODO_REQUIRE_SMOKE_URLS: ${{ vars.KOMODO_REQUIRE_SMOKE_URLS }}
      KOMODO_RUN_DIRECTORY: ${{ vars.KOMODO_RUN_DIRECTORY }}
      KOMODO_SMOKE_URLS: ${{ vars.KOMODO_SMOKE_URLS }}
      REGISTRY: harbor.dsub.io
      REGISTRY_PROJECT: dsub
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Validate Komodo credentials
        id: komodo_credentials
        shell: bash
        env:
          KOMODO_API_KEY: ${{ secrets.KOMODO_API_KEY }}
          KOMODO_API_SECRET: ${{ secrets.KOMODO_API_SECRET }}
          KOMODO_PASSWORD: ${{ secrets.KOMODO_PASSWORD }}
          KOMODO_TOKEN: ${{ secrets.KOMODO_TOKEN }}
          KOMODO_URL: ${{ secrets.KOMODO_URL }}
          KOMODO_USERNAME: ${{ secrets.KOMODO_USERNAME }}
        run: |
          set -euo pipefail
          if [ -z "${KOMODO_URL:-}" ]; then
            echo "available=false" >> "${GITHUB_OUTPUT}"
            echo "::warning::Skipping Komodo deploy; missing secret: KOMODO_URL"
            exit 0
          fi
          if [ -n "${KOMODO_TOKEN:-}" ]; then
            echo "available=true" >> "${GITHUB_OUTPUT}"
            exit 0
          fi
          if [ -n "${KOMODO_API_KEY:-}" ] && [ -n "${KOMODO_API_SECRET:-}" ]; then
            echo "available=true" >> "${GITHUB_OUTPUT}"
            exit 0
          fi
          if [ -n "${KOMODO_USERNAME:-}" ] && [ -n "${KOMODO_PASSWORD:-}" ]; then
            echo "available=true" >> "${GITHUB_OUTPUT}"
            exit 0
          fi
          echo "available=false" >> "${GITHUB_OUTPUT}"
          echo "::warning::Skipping Komodo deploy; missing credentials: set KOMODO_TOKEN, KOMODO_API_KEY/KOMODO_API_SECRET, or KOMODO_USERNAME/KOMODO_PASSWORD"
          exit 0

      - name: Sync stack files and deploy
        if: ${{ steps.komodo_credentials.outputs.available == 'true' }}
        env:
          KOMODO_API_KEY: ${{ secrets.KOMODO_API_KEY }}
          KOMODO_API_SECRET: ${{ secrets.KOMODO_API_SECRET }}
          KOMODO_PASSWORD: ${{ secrets.KOMODO_PASSWORD }}
          KOMODO_STACK_NAME: ${{ secrets.KOMODO_STACK_NAME }}
          KOMODO_TOKEN: ${{ secrets.KOMODO_TOKEN }}
          KOMODO_URL: ${{ secrets.KOMODO_URL }}
          KOMODO_USERNAME: ${{ secrets.KOMODO_USERNAME }}
        run: node ./scripts/ci/deploy-komodo-production.mjs
