name: ${JUNO_WHOLESALE_OPS_DEV_PROJECT_NAME:-juno-wholesale-ops-dev}

services:
  postgres:
    image: postgres:18.4-alpine
    container_name: ${JUNO_WHOLESALE_OPS_POSTGRES_CONTAINER_NAME:-juno-wholesale-ops-postgres}
    ports:
      - "${JUNO_WHOLESALE_OPS_POSTGRES_PUBLIC_PORT:-5437}:5432"
    environment:
      POSTGRES_DB: ${JUNO_WHOLESALE_OPS_POSTGRES_DB:-juno_wholesale_ops}
      POSTGRES_USER: ${JUNO_WHOLESALE_OPS_POSTGRES_USER:-juno_wholesale_ops_app}
      POSTGRES_PASSWORD: ${JUNO_WHOLESALE_OPS_POSTGRES_PASSWORD:-change-me}
    volumes:
      - postgres-data:/var/lib/postgresql
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\"",
        ]
      interval: 5s
      timeout: 3s
      retries: 12

  cloudflared:
    image: ${JUNO_WHOLESALE_OPS_CLOUDFLARED_IMAGE:-cloudflare/cloudflared:2026.3.0}
    container_name: ${JUNO_WHOLESALE_OPS_CLOUDFLARED_CONTAINER_NAME:-juno-wholesale-ops-cloudflared}
    profiles:
      - tunnel
    command: tunnel --config /etc/cloudflared/config.yml run
    volumes:
      - ${JUNO_WHOLESALE_OPS_CLOUDFLARED_CONFIG:-../.data/cloudflared/config.yml}:/etc/cloudflared/config.yml:ro
      - ${JUNO_WHOLESALE_OPS_CLOUDFLARED_CREDENTIALS:-../.data/cloudflared/credentials.json}:/etc/cloudflared/credentials.json:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  minio:
    image: harbor.dsub.io/proxy-dockerhub/minio/minio:RELEASE.2025-04-22T22-12-26Z
    container_name: ${JUNO_WHOLESALE_OPS_MINIO_CONTAINER_NAME:-juno-wholesale-ops-minio}
    command: server /data --console-address ":9001"
    ports:
      - "${JUNO_WHOLESALE_OPS_MINIO_API_PUBLIC_PORT:-29100}:9000"
      - "${JUNO_WHOLESALE_OPS_MINIO_CONSOLE_PUBLIC_PORT:-29101}:9001"
    environment:
      MINIO_ROOT_USER: ${JUNO_WHOLESALE_OPS_MINIO_ROOT_USER:-juno_wholesale_ops}
      MINIO_ROOT_PASSWORD: ${JUNO_WHOLESALE_OPS_MINIO_ROOT_PASSWORD:-change-me-minio}
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 3s
      retries: 12

  minio-init:
    image: harbor.dsub.io/proxy-dockerhub/minio/mc@sha256:37d109dddbbb2c95873f5fc81ac93f37023264770fc580a7564148892087b1b7
    container_name: ${JUNO_WHOLESALE_OPS_MINIO_INIT_CONTAINER_NAME:-juno-wholesale-ops-minio-init}
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${JUNO_WHOLESALE_OPS_MINIO_ROOT_USER:-juno_wholesale_ops}
      MINIO_ROOT_PASSWORD: ${JUNO_WHOLESALE_OPS_MINIO_ROOT_PASSWORD:-change-me-minio}
      MINIO_BUCKET: ${JUNO_WHOLESALE_OPS_MINIO_BUCKET:-juno-wholesale-ops}
    entrypoint: >
      /bin/sh -c "
      mc alias set minio http://minio:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD};
      mc mb --ignore-existing minio/$${MINIO_BUCKET};
      "

volumes:
  postgres-data:
    external: true
    name: juno-wholesale-ops-postgres-data
  minio-data:
    external: true
    name: juno-wholesale-ops-minio-data
