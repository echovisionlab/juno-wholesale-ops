name: ${JUNO_WHOLESALE_OPS_DEV_PROJECT_NAME:-juno-wholesale-ops-dev}

services:
  postgres:
    image: postgres:18.4-alpine
    container_name: ${JUNO_WHOLESALE_OPS_POSTGRES_CONTAINER_NAME:-juno-wholesale-ops-postgres}
    ports:
      - "${JUNO_WHOLESALE_OPS_POSTGRES_PUBLIC_PORT:-5437}:5432"
    environment:
      POSTGRES_DB: ${JUNO_WHOLESALE_OPS_POSTGRES_DB:-juno_wholesale_ops}
      POSTGRES_USER: ${JUNO_WHOLESALE_OPS_POSTGRES_USER:-juno_wholesale_ops_app}
      POSTGRES_PASSWORD: ${JUNO_WHOLESALE_OPS_POSTGRES_PASSWORD:-change-me}
    volumes:
      - postgres-data:/var/lib/postgresql
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\"",
        ]
      interval: 5s
      timeout: 3s
      retries: 12

  cloudflared:
    image: ${JUNO_WHOLESALE_OPS_CLOUDFLARED_IMAGE:-cloudflare/cloudflared:2026.3.0}
    container_name: ${JUNO_WHOLESALE_OPS_CLOUDFLARED_CONTAINER_NAME:-juno-wholesale-ops-cloudflared}
    profiles:
      - tunnel
    command: tunnel --config /etc/cloudflared/config.yml run
    volumes:
      - ${JUNO_WHOLESALE_OPS_CLOUDFLARED_CONFIG:-../.data/cloudflared/config.yml}:/etc/cloudflared/config.yml:ro
      - ${JUNO_WHOLESALE_OPS_CLOUDFLARED_CREDENTIALS:-../.data/cloudflared/credentials.json}:/etc/cloudflared/credentials.json:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

volumes:
  postgres-data:
    external: true
    name: juno-wholesale-ops-postgres-data
