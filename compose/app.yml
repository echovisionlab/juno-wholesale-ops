name: ${JUNO_WHOLESALE_OPS_STACK_PROJECT_NAME:-juno-wholesale-ops}

services:
  web-prod:
    image: ${JUNO_WHOLESALE_OPS_WEB_IMAGE:?set JUNO_WHOLESALE_OPS_WEB_IMAGE to an immutable image tag}
    container_name: juno-wholesale-ops-web-${JUNO_WHOLESALE_OPS_CONTAINER_SUFFIX:-prod}
    ports:
      - "3006:3006"
    environment:
      NODE_ENV: production
      HOSTNAME: 0.0.0.0
      PORT: 3006
      NEXT_TELEMETRY_DISABLED: "1"
      DATABASE_URL: ${DATABASE_URL:?set DATABASE_URL}
      AUTH_INITIAL_ADMIN_EMAIL: ${AUTH_INITIAL_ADMIN_EMAIL:-}
      AUTH_INITIAL_ADMIN_PASSWORD: ${AUTH_INITIAL_ADMIN_PASSWORD:-}
    volumes:
      - juno-wholesale-ops-mail-attachments:/var/lib/juno-wholesale-ops/mail-attachments
      - juno-wholesale-ops-browser-profile:/var/lib/juno-wholesale-ops/juno-browser-profile
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3006/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 30s
      timeout: 3s
      retries: 3

volumes:
  juno-wholesale-ops-mail-attachments:
  juno-wholesale-ops-browser-profile:
