name: ${JUNO_WHOLESALE_OPS_STACK_PROJECT_NAME:-juno-wholesale-ops}

services:
  web-prod:
    image: ${JUNO_WHOLESALE_OPS_WEB_IMAGE:?set JUNO_WHOLESALE_OPS_WEB_IMAGE to an immutable image tag}
    container_name: juno-wholesale-ops-web-${JUNO_WHOLESALE_OPS_CONTAINER_SUFFIX:-prod}
    ports:
      - "${JUNO_WHOLESALE_OPS_WEB_PUBLIC_PORT:-3006}:3006"
    environment:
      NODE_ENV: production
      HOSTNAME: 0.0.0.0
      PORT: 3006
      NEXT_TELEMETRY_DISABLED: "1"
      DATABASE_URL: ${DATABASE_URL:?set DATABASE_URL}
      JUNO_WHOLESALE_OPS_DATA_MODE: ${JUNO_WHOLESALE_OPS_DATA_MODE:-demo}
      AUTH_BASE_URL: ${AUTH_BASE_URL:-}
      AUTH_TRUSTED_ORIGINS: ${AUTH_TRUSTED_ORIGINS:-}
      AUTH_EMAIL_PASSWORD_ENABLED: ${AUTH_EMAIL_PASSWORD_ENABLED:-true}
      AUTH_EXTERNAL_PROVIDER_ENABLED: ${AUTH_EXTERNAL_PROVIDER_ENABLED:-false}
      AUTH_EXTERNAL_PROVIDER_ID: ${AUTH_EXTERNAL_PROVIDER_ID:-}
      AUTH_EXTERNAL_PROVIDER_NAME: ${AUTH_EXTERNAL_PROVIDER_NAME:-}
      AUTH_EXTERNAL_PROVIDER_LOGO_URL: ${AUTH_EXTERNAL_PROVIDER_LOGO_URL:-}
      AUTH_EXTERNAL_PROVIDER_BUTTON_LABEL: ${AUTH_EXTERNAL_PROVIDER_BUTTON_LABEL:-}
      AUTH_EXTERNAL_DISCOVERY_URL: ${AUTH_EXTERNAL_DISCOVERY_URL:-}
      AUTH_EXTERNAL_CLIENT_ID: ${AUTH_EXTERNAL_CLIENT_ID:-}
      AUTH_EXTERNAL_CLIENT_SECRET: ${AUTH_EXTERNAL_CLIENT_SECRET:-}
      AUTH_EXTERNAL_PROVIDER_SCOPES: ${AUTH_EXTERNAL_PROVIDER_SCOPES:-openid email profile}
      AUTH_ADMIN_EMAIL_ALLOWLIST: ${AUTH_ADMIN_EMAIL_ALLOWLIST:-}
      AUTH_EXTERNAL_ADMIN_CLAIM: ${AUTH_EXTERNAL_ADMIN_CLAIM:-}
      AUTH_EXTERNAL_ADMIN_CLAIM_VALUE: ${AUTH_EXTERNAL_ADMIN_CLAIM_VALUE:-}
      AUTH_INITIAL_ADMIN_EMAIL: ${AUTH_INITIAL_ADMIN_EMAIL:-}
      AUTH_INITIAL_ADMIN_PASSWORD: ${AUTH_INITIAL_ADMIN_PASSWORD:-}
      AUTH_INITIAL_ADMIN_NAME: ${AUTH_INITIAL_ADMIN_NAME:-Initial Admin}
      NEXT_PUBLIC_FONT_STYLESHEET_URL: ${NEXT_PUBLIC_FONT_STYLESHEET_URL:-}
      GOOGLE_WORKSPACE_DELEGATED_USER: ${GOOGLE_WORKSPACE_DELEGATED_USER:-}
      GOOGLE_SERVICE_ACCOUNT_KEY_JSON: ${GOOGLE_SERVICE_ACCOUNT_KEY_JSON:-}
      GOOGLE_GMAIL_SCOPES: ${GOOGLE_GMAIL_SCOPES:-https://www.googleapis.com/auth/gmail.readonly}
      GMAIL_INGEST_QUERY: ${GMAIL_INGEST_QUERY:-has:attachment filename:xlsx newer_than:30d}
      GMAIL_MAX_RESULTS: ${GMAIL_MAX_RESULTS:-25}
      GMAIL_INGEST_LOOKBACK_MS: ${GMAIL_INGEST_LOOKBACK_MS:-604800000}
      GMAIL_PROCESSED_LABEL: ${GMAIL_PROCESSED_LABEL:-Wholesale Processed}
      GMAIL_STORAGE_DIR: ${GMAIL_STORAGE_DIR:-/var/lib/juno-wholesale-ops/mail-attachments}
      CATALOG_ATTACHMENT_PATTERN: ${CATALOG_ATTACHMENT_PATTERN:-New Preorders|New Releases In Stock}
      SUPPLIER_CODE: ${SUPPLIER_CODE:-juno}
      JUNO_LIVE_ENQUEUE_ON_INGEST: ${JUNO_LIVE_ENQUEUE_ON_INGEST:-false}
      JUNO_LOGIN_EMAIL: ${JUNO_LOGIN_EMAIL:-}
      JUNO_LOGIN_PASSWORD: ${JUNO_LOGIN_PASSWORD:-}
      JUNO_BROWSER_PROFILE_DIR: ${JUNO_BROWSER_PROFILE_DIR:-/var/lib/juno-wholesale-ops/juno-browser-profile}
      JUNO_BROWSER_HEADLESS: ${JUNO_BROWSER_HEADLESS:-true}
      JUNO_LIVE_CONCURRENCY: ${JUNO_LIVE_CONCURRENCY:-1}
      JUNO_LIVE_DELAY_MIN_MS: ${JUNO_LIVE_DELAY_MIN_MS:-30000}
      JUNO_LIVE_DELAY_MAX_MS: ${JUNO_LIVE_DELAY_MAX_MS:-180000}
      JUNO_LIVE_NAV_TIMEOUT_MS: ${JUNO_LIVE_NAV_TIMEOUT_MS:-45000}
      JUNO_LIVE_MAX_ATTEMPTS: ${JUNO_LIVE_MAX_ATTEMPTS:-2}
      JUNO_LIVE_POLL_INTERVAL_MS: ${JUNO_LIVE_POLL_INTERVAL_MS:-}
      JUNO_LIVE_AUTO_ENQUEUE_ON_INTERVAL: ${JUNO_LIVE_AUTO_ENQUEUE_ON_INTERVAL:-false}
      JUNO_LIVE_AUTO_ENQUEUE_LIMIT: ${JUNO_LIVE_AUTO_ENQUEUE_LIMIT:-1000}
      JUNO_LIVE_WORKER_COMMAND: ${JUNO_LIVE_WORKER_COMMAND:-}
      JUNO_LIVE_WORKER_ARGS: ${JUNO_LIVE_WORKER_ARGS:-}
    volumes:
      - juno-wholesale-ops-mail-attachments:/var/lib/juno-wholesale-ops/mail-attachments
      - juno-wholesale-ops-browser-profile:/var/lib/juno-wholesale-ops/juno-browser-profile
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3006/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 30s
      timeout: 3s
      retries: 3

volumes:
  juno-wholesale-ops-mail-attachments:
  juno-wholesale-ops-browser-profile:
